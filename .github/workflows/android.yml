# FILE: .github/workflows/android.yml
# TÁC DỤNG: Build APK ví BTC trên GitHub, chạy thủ công

name: Build BTC Mainnet APK

on:
  workflow_dispatch:  # Chỉ chạy khi bạn bấm nút

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # BƯỚC 1: Lấy code
      - name: 1. Lấy code
        uses: actions/checkout@v4

      # BƯỚC 2: Cài JDK 17
      - name: 2. Cài JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # BƯỚC 3: Cài Android SDK (bắt buộc)
      - name: 3. Cài Android SDK
        uses: android-actions/setup-android@v3

      # BƯỚC 4: BUILD BẰNG GRADLE 8.4 - SỬA LỖI CHÍNH
      # Lần trước máy ảo dùng Gradle 9.5.1 quá mới, không tương thích plugin 8.1.4
      # Giờ ép dùng Gradle 8.4 là phiên bản chuẩn cho Android
      - name: 4. Build APK Debug
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.4'  # Ép đúng version
          arguments: assembleDebug --stacktrace

      # BƯỚC 5: Lưu APK
      - name: 5. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hvl-btc-mainnet-apk
          path: app/build/outputs/apk/debug/*.apk