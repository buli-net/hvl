# FILE: .github/workflows/android.yml
# TÁC DỤNG: Build APK ví BTC mainnet trên máy ảo GitHub, chạy thủ công

name: Build BTC Mainnet APK

# Chỉ chạy khi bạn bấm nút, không tự động
on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # BƯỚC 1: Tải code từ repo về máy ảo
      - name: 1. Lấy code
        uses: actions/checkout@v4

      # BƯỚC 2: Cài Java 17 (Android cần Java 17)
      - name: 2. Cài JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'  # Bản Java miễn phí của Eclipse
          java-version: '17'
          cache: 'gradle'  # Lưu cache để lần sau build nhanh

      # BƯỚC 3: CÀI ANDROID SDK - BƯỚC QUAN TRỌNG BỊ THIẾU LÚC NÃY
      # Nếu không có SDK, Gradle sẽ báo lỗi "SDK location not found"
      - name: 3. Cài Android SDK
        uses: android-actions/setup-android@v3

      # BƯỚC 4: Cho phép file gradlew chạy được trên Linux
      - name: 4. Cấp quyền gradlew
        run: chmod +x gradlew

      # BƯỚC 5: Lệnh build APK debug
      # --stacktrace để nếu lỗi sẽ hiện rõ nguyên nhân
      - name: 5. Build APK Debug
        run: ./gradlew assembleDebug --stacktrace

      # BƯỚC 6: Lưu file APK để bạn tải về
      - name: 6. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hvl-btc-mainnet-apk
          path: app/build/outputs/apk/debug/*.apk