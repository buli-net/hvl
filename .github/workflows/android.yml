# FILE: .github/workflows/android.yml
# TÁC DỤNG: Workflow GitHub Actions để build ví BTC mainnet thành file APK

name: Build BTC Mainnet APK

# Chạy thủ công khi bạn bấm nút (an toàn, không tự chạy)
on:
  workflow_dispatch:

jobs:
  build-apk:
    # Máy ảo Ubuntu để build
    runs-on: ubuntu-latest

    steps:
      # BƯỚC 1: Lấy toàn bộ code từ repo hvl về máy ảo
      - name: 1. Checkout mã nguồn
        uses: actions/checkout@v4

      # BƯỚC 2: Cài Java 17 - bắt buộc cho Android Gradle Plugin mới
      - name: 2. Cài JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # BƯỚC 3: Cấp quyền chạy cho Gradle wrapper
      - name: 3. Cấp quyền gradlew
        run: chmod +x gradlew

      # BƯỚC 4: Build ra file APK debug (dùng để cài thử)
      # Lệnh này sẽ biên dịch toàn bộ code Kotlin + thư viện bitcoinj
      - name: 4. Build APK Debug
        run: ./gradlew assembleDebug --stacktrace

      # BƯỚC 5: Lưu file APK để bạn tải về từ tab Actions
      - name: 5. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hvl-btc-mainnet-apk
          path: app/build/outputs/apk/debug/app-debug.apk