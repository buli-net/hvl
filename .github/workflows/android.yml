# FILE: .github/workflows/android.yml
# TÁC DỤNG: Build APK ví BTC mainnet trên GitHub Actions

name: Build BTC Mainnet APK

on:
  workflow_dispatch:  # Chỉ chạy khi bạn bấm nút Run

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # BƯỚC 1: Lấy code từ repo
      - name: 1. Lấy code
        uses: actions/checkout@v4

      # BƯỚC 2: Cài JDK 17
      - name: 2. Cài JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # BƯỚC 3: Cài Android SDK
      - name: 3. Cài Android SDK
        uses: android-actions/setup-android@v3

      # BƯỚC 4: Build bằng Gradle 8.4 (ép version)
      # Lần trước dùng Gradle 9.5 nên lỗi, giờ ép 8.4 tương thích AGP 8.3.2
      - name: 4. Build APK Debug
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.4'
          arguments: assembleDebug --stacktrace

      # BƯỚC 5: Lưu file APK để tải về
      - name: 5. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hvl-btc-mainnet-apk
          path: app/build/outputs/apk/debug/*.apk