// FILE: app/build.gradle
// TÁC DỤNG: Cấu hình app ví BTC, tải thư viện bitcoinj để tạo ví mainnet

plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    // Tên gói duy nhất của app
    namespace 'com.hvl.wallet'
    compileSdk 34

    defaultConfig {
        applicationId "com.hvl.wallet"
        minSdk 24          // Chạy từ Android 7.0 trở lên
        targetSdk 34
        versionCode 1
        versionName "1.0-mainnet"

        // Bật vector drawable cho icon ví
        vectorDrawables.useSupportLibrary = true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            // Cho phép cài debug dễ dàng
            applicationIdSuffix ".debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        viewBinding true  // Dùng để truy cập giao diện dễ hơn
    }
}

dependencies {
    // THƯ VIỆN GIAO DIỆN
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // THƯ VIỆN BITCOINJ - QUAN TRỌNG NHẤT
    // Đây là thư viện tạo ví BTC mainnet, gửi/nhận, tạo địa chỉ
    // Version 0.16.2 hỗ trợ Taproot và mainnet đầy đủ
    implementation 'org.bitcoinj:bitcoinj-core:0.16.2'

    // Thư viện mã hóa bổ sung cho bitcoinj
    implementation 'org.bouncycastle:bcprov-jdk18on:1.78.1'

    // Logging
    implementation 'org.slf4j:slf4j-android:1.7.36'
}