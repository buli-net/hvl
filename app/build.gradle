// FILE: app/build.gradle
// TÁC DỤNG: Cấu hình chi tiết app ví BTC mainnet

plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.hvl.wallet'
    compileSdk 34

    defaultConfig {
        applicationId "com.hvl.wallet"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0-mainnet"
        // BẬT multiDex vì bitcoinj rất lớn, vượt 64k method
        multiDexEnabled true
    }

    // LOẠI BỎ FILE TRÙNG - sửa lỗi packaging của bitcoinj
    packaging {
        resources {
            excludes += "/META-INF/*"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        viewBinding true
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    // THƯ VIỆN BITCOINJ - tạo ví mainnet thật
    implementation 'org.bitcoinj:bitcoinj-core:0.16.2'
    // Hỗ trợ multiDex
    implementation 'androidx.multidex:multidex:2.0.1'
}